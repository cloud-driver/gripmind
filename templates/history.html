<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>歷史握力數據</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: linear-gradient(to right, #74ebd5, #acb6e5);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 100%;
      max-width: 900px;
      box-sizing: border-box;
    }

    /* 圖表區塊 */
    .chart-container {
      position: relative;
      width: 100%;
      height: 500px;
      margin-bottom: 30px;
    }
    /* 強制 canvas 滿版 */
    .chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* AI 建議區塊 */
    .ai-suggestion {
      text-align: left;
      margin-top: 20px;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
      font-size: 1.5rem;
      word-break: break-word;
    }
    h2 {
      font-size: 1.3rem;
      color: #333;
      margin-bottom: 10px;
    }
    p {
      color: #333;
      font-size: 1rem;
    }
    button,
    .btn {
      display: inline-block;
      background-color: #00c300;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      margin: 5px;
    }
    button:disabled,
    .btn:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }
    
    /* Loading 動畫 */
    .spinner-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      display: none;
    }
    @keyframes pulse {
      from {
        opacity: 1;
        transform: scale(1);
      }
      to {
        opacity: .25;
        transform: scale(.75);
      }
    }
    .pulse-container {
      width: 120px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pulse-bubble {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background-color: #00c300;
    }
    .pulse-bubble-1 {
      animation: pulse .4s ease 0s infinite alternate;
    }
    .pulse-bubble-2 {
      animation: pulse .4s ease .2s infinite alternate;
    }
    .pulse-bubble-3 {
      animation: pulse .4s ease .4s infinite alternate;
    }

    /* 行動裝置優化 */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .container {
        padding: 20px;
        border-radius: 10px;
      }
      h1 {
        font-size: 1.2rem;
      }
      h2 {
        font-size: 1.1rem;
      }
      p {
        font-size: 0.9rem;
      }
      .chart-container {
        height: 300px;
      }
      .ai-suggestion {
        font-size: 0.9rem;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="spinner-box">
    <div class="pulse-container">  
      <div class="pulse-bubble pulse-bubble-1"></div>
      <div class="pulse-bubble pulse-bubble-2"></div>
      <div class="pulse-bubble pulse-bubble-3"></div>
    </div>
  </div>

  <div class="container">
    <h1>歷史握力數據：<strong>{{ request.args.get('device_id') }}</strong></h1>

    {% if data %}
      <div class="chart-container">
        <canvas id="historyChart"></canvas>
      </div>
      <script>
        const labels = {{ labels|tojson }};
        const dataVals = {{ data|tojson }};
        const target = {{ target_weight or 'null' }};

        const ctx = document.getElementById('historyChart').getContext('2d');
        const datasets = [{
          label: 'Grip (kg)',
          data: dataVals,
          borderColor: 'rgba(75, 192, 192, 1)',
          backgroundColor: 'rgba(75, 192, 192, 0.2)',
          fill: false,
          tension: 0.1
        }];

        if (target !== null) {
          const targetArr = labels.map(() => target);
          datasets.push({
            label: '目標值',
            data: targetArr,
            borderColor: 'rgba(255,99,132,1)',
            borderDash: [5, 5],
            fill: false,
            pointRadius: 0
          });
        }

        new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                title: { display: true, text: '時間' },
                ticks: { autoSkip: true, maxTicksLimit: 20 }
              },
              y: {
                title: { display: true, text: 'Grip (kg)' },
                beginAtZero: true
              }
            }
          }
        });
      </script>
    {% else %}
      <p>尚未找到裝置 <strong>{{ request.args.get('device_id') }}</strong> 的歷史數據。</p>
    {% endif %}

    <div class="ai-suggestion">
      <h2>訓練建議：</h2>
      <div id="ai-result" class="markdown-body"></div>
      {% if is_logged_in %}
        <p>剩餘點數：<span id="user-points">{{ user_points }}</span></p>
      {% endif %}
      <button id="analyze-btn">
        {% if is_logged_in %}
          AI 分析 (消耗 30 點)
        {% else %}
          登入以使用 AI 分析
        {% endif %}
      </button>
      <p>註：此建議為AI生成，可能會有錯誤，如有需要請及時就醫！</p>
    </div>

    <a href="/"><button>回主頁</button></a>
  </div>

  <script>
    document.getElementById('analyze-btn').addEventListener('click', function() {
        var analyzeBtn = this;
        var spinner = document.querySelector('.spinner-box');
        var is_logged_in = {{ is_logged_in|tojson }};
        var deviceId = '{{ request.args.get('device_id') }}';

        if (!is_logged_in) {
            window.location.href = '/setup?device_id=' + deviceId;
            return;
        }

        analyzeBtn.style.display = 'none';
        spinner.style.display = 'block';

        fetch('/analyze', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': '{{ csrf_token() }}'
            },
            body: 'device_id=' + deviceId
        })
        .then(response => response.json())
        .then(data => {
            spinner.style.display = 'none';
            if (data.error) {
                document.getElementById('ai-result').innerHTML = '<p>' + data.error + '</p>';
                analyzeBtn.style.display = 'inline-block';
            } else {
                document.getElementById('ai-result').innerHTML = data.analysis;
                document.getElementById('user-points').innerText = data.new_points;
            }
        })
        .catch(error => {
            spinner.style.display = 'none';
            analyzeBtn.style.display = 'inline-block';
            document.getElementById('ai-result').innerHTML = '<p>分析時發生錯誤，請稍後再試。</p>';
            console.error('Error:', error);
        });
    });
  </script>
</body>
</html>
